<!DOCTYPE html>
<html>
<body>

<form action="/submit" method="POST">

<fieldset>

<legend>Student Registration</legend>

<label>Name:</label>
<input type="text" required>

<br><br>

<label>Email:</label>
<input type="email" required>

<br><br>

<label>Password:</label>
<input type="password">

<br><br>

<label>Gender:</label>

<input type="radio" name="gender">Male

<input type="radio" name="gender">Female

<br><br>

<label>Skills:</label>

<input type="checkbox">HTML
<input type="checkbox">CSS
<input type="checkbox">JavaScript

<br><br>

<label>Country:</label>

<select>

<option>India</option>

<option>USA</option>

<option>Japan</option>

</select>

<br><br>

<label>Address:</label>

<textarea></textarea>

<br><br>

<input type="submit">

<input type="reset">

</fieldset>

</form>

</body>
</html>
